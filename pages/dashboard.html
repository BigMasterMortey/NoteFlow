<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NoteFlow</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body id="dashboard-view" class="notebook-skin">
    <h4 id="dashboard-main">NoteFlow</h4> <!-- EDITED: Reverted to original design and moved outside margin -->
    <div class="workspace">
            <aside>
                <nav class="margin-nav">
                    <button class="nav-btn" data-target="notes">Notes</button>
                    <button class="nav-btn" data-target="tasks">Tasks</button>
                    <button class="nav-btn" data-target="settings">Settings</button>
                    <button class="nav-btn logout-btn" data-target="logout">Logout</button>
                </nav>
            </aside>
        
        <main>
            <section id="notes">
            <div id="notes-list-view" class="view-container">
                    <div class="dashboard-header"> <!-- EDITED: Added header for search and filter -->
                        <h2>Notes</h2>
                        <div class="search-filter-container">
                            <input type="text" id="note-search" placeholder="Search notes...">
                            <button id="filter-btn" aria-label="filter notes">🔍</button>
                        </div>
                    </div>
                    <div id="notes-list"><p>Your saved notes will appear here</p></div>
            </div>
            <div id="notes-editor-view" class="view-container view-hidden">
                    <div id="editor-nav">
                        <div class="nav-left">
                            <button id="editor-back-btn" class="back-sign" aria-label="back to notes list">←</button>
                        </div>
                        <div class="nav-right">
                            <button id="editor-star-btn" class="star-btn" aria-label="mark as important">⭐</button> <!-- EDITED: Added priority toggle -->
                            <button id="editor-lock-btn" class="lock-btn" aria-label="lock note">🔒</button> <!-- EDITED: Added padlock -->
                            <button id="editor-save-btn" class="save-tick-btn" aria-label="save note">✓</button>
                        </div>
                    </div>
                    <input type="text" id="note-title-input" placeholder="Note Title(optional)" class="line-locked-title">
                    <!-- EDITED: Changed textarea to div contenteditable for rich text support -->
                    <div id="note-content-input" class="line-locked-content" contenteditable="true" data-placeholder="Start writing..."></div>
                    
                    <!-- EDITED: Floating toolbar for rich text -->
                    <div id="text-toolbar" class="floating-toolbar">
                        <button onclick="formatText('bold')">B</button>
                        <button onclick="formatText('underline')">U</button>
                        <button onclick="formatText('hiliteColor', 'greenyellow')">✨</button>
                    </div>
            </div>
            </section>
            <section id="tasks">
                <div class="dashboard-header"> <!-- EDITED: Tasks Header -->
                    <h2>Tasks</h2>
                    <div class="search-filter-container">
                        <button id="add-task-btn" class="add-btn" style="display: none;">Add Task</button> <!-- EDITED: Hidden -->
                    </div>
                </div>
                <div id="tasks-list" class="notebook-list">
                    <!-- EDITED: Tasks will be rendered here -->
                </div>
            </section>
            <section id="settings">
                <div class="dashboard-header"> <!-- EDITED: Settings Header -->
                    <h2>Settings</h2>
                </div>
                <div class="settings-container">
                    <div class="setting-item">
                        <span>Dark Mode (Night Study)</span>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span>Compact View</span>
                        <label class="switch">
                            <input type="checkbox" id="compact-view-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span>Clear All Data</span>
                        <button id="clear-data-btn" class="danger-btn">Reset</button>
                    </div>
                </div>
            </section>
        </main>
        <button id="fab-pen" aria-label="add item">✎</button> <!-- EDITED: Moved to shared scope -->
    </div>
<script src="../app.js"></script>
</body>
</html>
